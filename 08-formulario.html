<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario em HTML 5</title>
</head>
<body>
    <h1>Formulario em HTML </h1>

    <h2>cadastro</h2>
    <form action="">
     <label for="nome">Nome completo</label><br>
    <input 
    type="text"
    name="Nome" 
    id="nome"
     placeholder="Digite seu nome"
     >
    <br><br>
    <label for="email"> email</label><br>
    <input 
    type="email" 
    name="email" id="email" 
    placeholder="Digite seu email">
    <br><br>
    <label for="senha">senha:</label><BR>
    <input 
    type="password" 
    name="senha" id="senha" 
    placeholder="Digite sua senha"
    >
</BR></BR>
<label for="data de nascimento">Data de nascimento:</label><br>
    <input 
    type="date" 
    name="data de nascimento" 
    id="data-nascimento" 
    >
    <br><br>
    <label for="genero">Genêro</label><br>
    <input type="radio" name="genero" id="masculino" value="masculino">
    <label for="masculino">Masculino</label>

    <input type="radio" name="genero" id="feminino" value="feminino">
    <label for="feminino">Feminino</label>
    <br><br>
    <label for="setor">setor</label><br>
    <select name="setor" id="setor">
        <option value="">Selecione um setor</option>
        <option value="rh">Recursos Humanos</option>
        <option value="financeiro">Financeiro</option>
        <option value="TI">TI</option>
    </select>
    <br><br>
    <label for="hobbies">Hobbies</label><br>
    <input type="checkbox" name="hobbies" id="leitura" value="leitura">
    <label for="leitura">Leitura</label>

    <input type="checkbox" name="hobbies" id="musica" value="musica">
    <label for="musica">Música</label>

    <input type="checkbox" name="hobbies" id="esportes" value="esportes">
    <label for="esportes">Esportes</label>
    <br><br>
    <button type="submit">cadastrar</button>
    <button type="reset">limpar</button>
    </form>
</body>
</html>
